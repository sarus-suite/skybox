name: build

on:
  workflow_dispatch:            # run manually from the Actions tab
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to build"
        required: false
        default: ""             # leave empty to use the selected branch in the UI

permissions:
  contents: write
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  REPO: ghcr.io/${{ github.repository.owner }}/containerfiles-ci/build-slurm

jobs:
  build:
    strategy:
      matrix:
        slurm_version: [ 25.05 ]
        build_os: [ opensuse-15.6 ]
        arch: [ amd64, arm64 ]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
#    container: 
#      image: ghcr.io/${{ github.repository_owner }}/containerfiles-ci/build-slurm:${{ matrix.slurm_version }}-${{ matrix.build_os }}
#      credentials:
#        username: ${{ github.actor }}
#        password: ${{ secrets.github_token }}
##      volumes:
##        - .:/tmp

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        env:
          BUILD_OS: ${{ matrix.build_os }}
          SLURM_VERSION: ${{ matrix.slurm_version }}
        uses: devcontainers/ci@v0.3
        with:
          configFile: ".devcontainer/${{ matrix.build_os }}/devcontainer.json"
          cacheFrom: "ghcr.io/${{ github.repository_owner }}/containerfiles-ci/build-slurm:${{ matrix.slurm_version }}-${{ matrix.build_os }}"
          push: never
          runCmd: |
            .github/devcontainer-release/opensuse/build_package.sh

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: Package
          path: ".github/dist/packages/*.*"
          if-no-files-found: error
          archive: false

      - name: Upload source package
        uses: actions/upload-artifact@v7
        if: ${{ matrix.arch == 'amd64' }}
        with:
          name: Package
          path: ".github/dist/src_packages/*.*"
          if-no-files-found: error
          archive: false

